name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format
        run: bun run check

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Publish to npm
        id: publish
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          VERSION=$(jq -r .version package.json)
          if npm view "@auldrant/api@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
            echo "Version $VERSION already published, skipping."
            echo "published=false" >> $GITHUB_OUTPUT
          else
            npm publish --provenance
            echo "published=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate App token
        id: app-token
        if: steps.publish.outputs.published == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.MERGE_APP_ID }}
          private-key: ${{ secrets.MERGE_APP_PRIVATE_KEY }}

      - name: Post publish comment
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER=$(git log -1 --format='%s' | grep -oP '\(#\K\d+(?=\))')
          if [ -n "$PR_NUMBER" ]; then
            VERSION=$(jq -r .version package.json)
            gh pr comment "$PR_NUMBER" --body "**Merge bot:** Published [\`@auldrant/api@$VERSION\`](https://www.npmjs.com/package/@auldrant/api/v/$VERSION) to npm."
          fi
